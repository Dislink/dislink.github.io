    <style>
        .object-container {
            border: 1px dashed var(--color-border-strong);
            margin: 4px 0 4px 20px;
            border-radius: var(--radius-sm);
            padding: 2px;

        .object-key {
            margin-right: 8px;
            font-weight: 600;
            cursor: pointer;
            color: var(--color-primary);
            font-size: 0.85rem;
        }
        .object-value {
            margin-left: 20px;
        }
        .collapsed .object-value {
            display: none;
        }
        .collapsed::after {
            content: '...';
            color: #6a00ff;
            margin-left: 5px;
        }
        .editable {
            display: inline-block;
            border: 1px solid var(--color-border-strong);
            padding: 2px 6px;
            margin-right: 20px;
            border-radius: var(--radius-sm);
            outline: none;
            width: auto;
            min-width: 50px;
            max-width: 500px;
            resize: none;
            white-space: pre-wrap;
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }
        .editable:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.12);
        }
        .add-button {
            margin-right: 8px;
            color: #16a34a;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            user-select: none;
        }
        .add-button:hover { color: #15803d; }
        .delete-button {
            margin-right: 8px;
            color: #dc2626;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            user-select: none;
        }
        .delete-button:hover { color: #b91c1c; }
        .delete-object-button {
            color: #dc2626;
            cursor: pointer;
        }
        @font-face {
            font-family: "Minecraft";
            src: url("/fonts/Mojangles.ttf");
        }
        @font-face {
            font-family: "Unifont";
            src: url("/fonts/unifont-15.1.04.otf");
        }
        .display {
            display: block;
            margin-top: 20px;
            border: 1px solid var(--color-border-strong);
            padding: 12px;
            border-radius: var(--radius-md);
            outline: none;
            min-height: 32px;
            resize: none;
            background: rgba(24, 24, 24, 0.85);
            color: #fff;
            font-weight: normal;
            font-style: normal;
            word-wrap: break-word;
            cursor: pointer;
        }
        .text {
            white-space: pre-wrap;
        }
        .random {
            color: rgba(255,255,255,0.15);
        }
        .object-key-container {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 0;
        }
        .json-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .note {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            margin-top: 8px;
        }
        .editor-section {
            background: var(--color-surface-alt);
            padding: 12px;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
        }
    </style>
    <title>原始JSON文本编辑器 | By Dislink</title>
    <script src="/javascript/error-handler.js"></script>

<body>
<div class="tool-container">
    <div class="page-header">
        <h1>原始JSON文本编辑器</h1>
        <div class="subtitle">Bug反馈/功能建议请前往 <a href="https://qm.qq.com/q/o3lzAuOili" target="_blank">QQ群</a></div>
    </div>

    <div class="card">
        <div class="card-header">rawJSON 编辑器</div>
        <div class="card-body editor-section">
            <div id="rawtext"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">extra (scores / selectors)</div>
        <div class="card-body editor-section">
            <div id="extra"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">显示预览 (点击刷新)</div>
        <div class="card-body">
            <p class="display" id="evaluateDisplay" title="点击刷新"></p>
        </div>
    </div>

    <p class="note">提示: 随机文本以淡色透明表示，可选中查看原文。双击折叠/展开对象。点击 "+" 或 "模板" 添加新属性。</p>

    <div class="page-footer">
        <span>Made by DislinkSforza</span>
        <div class="footer-links">
            <a href="https://qm.qq.com/cgi-bin/qm/qr?k=NQYXkW4V78oAb1jo6ZRA9i_jba2Gw1Hd" target="_blank">
                <img class="footer-icon" referrerpolicy="no-referrer" src="https://qlogo3.store.qq.com/qzone/1600515314/1600515314/100" alt=""> QQ
            </a>
            <a href="https://space.bilibili.com/490775607" target="_blank">
                <img class="footer-icon" src="https://www.bilibili.com/favicon.ico" alt=""> Bilibili
            </a>
            <a href="https://github.com/Dislink" target="_blank">
                <img class="footer-icon" src="https://github.com/favicon.ico" alt=""> GitHub
            </a>
        </div>
    </div>
</div>

<script>
    function evaluate(rawJSON, scores={}, selectors={}) {
        var rawtext=[];
        if(rawJSON.translate){
            var translate=rawJSON.translate.replaceAll(/%(.)/g,"$1");
            var index=0;
            var replacer;
            if(Array.isArray(rawJSON.with)){
                replacer=rawJSON.with.filter(function(item){ return typeof item=="string"; });
            }else if(typeof rawJSON.with=="object"){
                replacer=evaluate(rawJSON.with, scores, selectors);
            }
            if(!replacer?.length){ replacer=undefined; }
            while(/%[sd0-9]/.test(translate)&&replacer){
                while(/%[sd]/.test(translate)&&replacer){
                    translate=translate.replace(/%[sd]/,replacer[index]===undefined?"":replacer[index])
                    index++;
                }
                while(/%[0-9]/.test(translate)&&replacer){
                    var tindex=translate.match(/%([0-9])/)[1]-1;
                    translate=translate.replace(/%([0-9])/,replacer[tindex+index]===undefined?"":replacer[tindex+index])
                }
            }
            rawtext.push(translate);
        }
        if(rawJSON.text&&!rawJSON.translate){ rawtext.push(rawJSON.text); }
        if(rawJSON.selector&&!rawJSON.translate&&!rawJSON.text){
            if(selectors[rawJSON.selector]!==undefined) rawtext.push(selectors[rawJSON.selector]);
        }
        if(rawJSON.score&&!rawJSON.translate&&!rawJSON.text&&!rawJSON.selector){
            if(scores[rawJSON.score.objective]?.[rawJSON.score.name]!==undefined) rawtext.push(scores[rawJSON.score.objective]?.[rawJSON.score.name]);
        }
        if(rawJSON.rawtext){
            for(var i=0;i<rawJSON.rawtext.length;i++){ rawtext.push(...evaluate(rawJSON.rawtext[i], scores, selectors)); }
        }
        return rawtext;
    }
</script>
<script>
    collapseState = {};
    function renderObject(obj, container, level = 0, basePath = '') {
        container.innerHTML = '';
        if(container==rawtextContainer){
            const editButton = document.createElement('span');
            editButton.classList.add('add-button'); editButton.textContent = 'edit';
            editButton.addEventListener('click', (event) => {
                event.stopPropagation();
                const newValue = prompt('Enter the new property value:', JSON.stringify(obj));
                if(newValue===null) return;
                try{ data = obj = JSON.parse(newValue); }catch(e){ window.alert(`JSON.parse error: ${e}`); }
                renderObject(obj, container, level, basePath);
            });
            const copyButton = document.createElement('span');
            copyButton.classList.add('add-button'); copyButton.textContent = 'copy';
            copyButton.addEventListener('click', (event) => {
                event.stopPropagation();
                navigator.clipboard.writeText(JSON.stringify(obj));
            });
            const toolbar = document.createElement('div');
            toolbar.className = 'json-toolbar';
            toolbar.appendChild(editButton);
            toolbar.appendChild(copyButton);
            container.appendChild(toolbar);
        }
        for (let key in obj) {
            if (typeof obj[key] === 'object') {
                const objectContainer = document.createElement('div');
                objectContainer.classList.add('object-container');
                objectContainer.level = level;
                if(collapseState?.[basePath + key]){ objectContainer.classList.add('collapsed'); }
                objectContainer.addEventListener('dblclick', (event) => {
                    event.stopPropagation();
                    if(event.target.contentEditable!='true'){
                        objectContainer.classList.toggle('collapsed');
                        collapseState[basePath + key] = objectContainer.classList.contains('collapsed');
                    }
                });
                objectContainer.style.backgroundColor = level % 4 == 0 ? '#f8f9fa' : level % 4 == 1 ? '#e9ecef' : level % 4 == 2 ? '#dee2e6' : '#ced4da';

                const objectKeyContainer = document.createElement('div');
                objectKeyContainer.classList.add('object-key-container');

                const objectKey = document.createElement('span');
                objectKey.classList.add('object-key');
                objectKey.textContent = key;
                objectKey.contentEditable = true;
                objectKey.addEventListener('input', (event) => {
                    const newKey = event.target.textContent;
                    const value = obj[key];
                    if(Array.isArray(obj)){ obj.splice(key, 1); }else{ delete obj[key]; }
                    obj[newKey] = value;
                });
                const deleteButton = document.createElement('span');
                deleteButton.classList.add('delete-button'); deleteButton.textContent = '-';
                deleteButton.addEventListener('click', (event) => {
                    event.stopPropagation();
                    if(Array.isArray(obj)){ obj.splice(key, 1); }else{ delete obj[key]; }
                    renderObject(obj, container, level, basePath);
                });
                const editBtn = document.createElement('span');
                editBtn.classList.add('add-button'); editBtn.textContent = 'edit';
                editBtn.addEventListener('click', (event) => {
                    event.stopPropagation();
                    const newValue = prompt('Enter the new property value:', JSON.stringify(obj[key]));
                    if(newValue===null) return;
                    try{ obj[key] = JSON.parse(newValue); renderObject(obj, container, level, basePath); }catch(e){ window.alert(`${e}`); }
                });
                const copyBtn = document.createElement('span');
                copyBtn.classList.add('add-button'); copyBtn.textContent = 'copy';
                copyBtn.addEventListener('click', (event) => {
                    event.stopPropagation();
                    navigator.clipboard.writeText(JSON.stringify(obj[key]));
                });

                objectKeyContainer.appendChild(objectKey);
                objectKeyContainer.appendChild(deleteButton);
                objectKeyContainer.appendChild(editBtn);
                objectKeyContainer.appendChild(copyBtn);

                const objectValue = document.createElement('div');
                objectValue.classList.add('object-value');
                renderObject(obj[key], objectValue, level + 1, basePath + key + '.');

                objectContainer.appendChild(objectKeyContainer);
                objectContainer.appendChild(objectValue);
                container.appendChild(objectContainer);
            } else {
                const keyValue = document.createElement('div');
                keyValue.style.cssText = 'display:flex;align-items:center;gap:4px;padding:2px 0;flex-wrap:wrap;';
                keyValue.innerHTML = `<span class="object-key" contenteditable style="font-size:0.85rem;">${key}</span><span class="editable" style="flex:1;min-width:60px;" contenteditable>${obj[key]}</span><span class="delete-button" style="font-size:0.85rem;">-</span>`;
                keyValue.querySelector('.object-key').addEventListener('input', (event) => {
                    const newKey = event.target.textContent;
                    const value = obj[key];
                    if(Array.isArray(obj)){ obj.splice(key, 1); }else{ delete obj[key]; }
                    obj[newKey] = value;
                });
                keyValue.querySelector('.editable').addEventListener('input', (event) => { obj[key] = event.target.textContent; });
                keyValue.querySelector('.delete-button').addEventListener('click', (event) => {
                    if(Array.isArray(obj)){ obj.splice(key, 1); }else{ delete obj[key]; }
                    event.stopPropagation();
                    renderObject(obj, container, level, basePath);
                });
                container.appendChild(keyValue);
            }
        }
        if(Array.isArray(obj)){
            const templateButton = document.createElement('span');
            templateButton.classList.add('add-button'); templateButton.textContent = '模板';
            templateButton.addEventListener('click', (event) => {
                event.stopPropagation();
                const dialogue = document.createElement('dialog');
                dialogue.style.cssText = 'border:1px solid var(--color-border);border-radius:var(--radius-md);padding:1.25rem;background:var(--color-surface);';
                dialogue.innerHTML = `
                <form method="dialog">
                    <p style="margin-bottom:0.75rem;font-weight:600;">选择模板:</p>
                    <p><label>
                        <select style="width:100%;">
                            <option>text</option>
                            <option>rawtext</option>
                            <option>translate...with[...]</option>
                            <option>translate...with{rawtext}</option>
                            <option>score</option>
                            <option>selector</option>
                            <option>basic string</option>
                        </select>
                    </label></p>
                    <div style="display:flex;gap:0.5rem;margin-top:0.75rem;">
                        <button class="btn" value="cancel" style="flex:1;">取消</button>
                        <button class="btn btn-primary" id="confirmBtn" value="text" style="flex:1;">确定</button>
                    </div>
                </form>`;
                dialogue.querySelector('select').addEventListener('change', () => {
                    dialogue.returnValue = dialogue.querySelector('select').value;
                });
                dialogue.querySelector('#confirmBtn').addEventListener('click', () => {
                    dialogue.close(dialogue.returnValue);
                });
                dialogue.addEventListener('close', () => {
                    if (dialogue.returnValue === 'cancel') { console.log('User cancelled dialog.'); }
                    else {
                        if(dialogue.returnValue === 'rawtext'){ obj.push({"rawtext":[]}); renderObject(obj, container, level, basePath); }
                        else if(dialogue.returnValue === 'translate...with[...]'){ obj.push({"translate":"","with":[]}); renderObject(obj, container, level, basePath); }
                        else if(dialogue.returnValue === 'translate...with{rawtext}'){ obj.push({"translate":"","with":{"rawtext":[]}}); renderObject(obj, container, level, basePath); }
                        else if(dialogue.returnValue === 'score'){ obj.push({"score":{"name":"","objective":""}}); renderObject(obj, container, level, basePath); }
                        else if(dialogue.returnValue === 'selector'){ obj.push({"selector":""}); renderObject(obj, container, level, basePath); }
                        else if(dialogue.returnValue === 'basic string'){ obj.push(""); renderObject(obj, container, level, basePath); }
                        else{ obj.push({"text":""}); renderObject(obj, container, level, basePath); }
                    }
                    dialogue.remove();
                });
                document.body.appendChild(dialogue);
                dialogue.showModal();
            });
            container.insertBefore(templateButton, container.firstChild);
        }
        const addButton = document.createElement('span');
        addButton.classList.add('add-button'); addButton.textContent = '+';
        addButton.addEventListener('click', (event) => {
            event.stopPropagation();
            addObjectProperty(obj, container, basePath);
        });
        container.insertBefore(addButton, container.firstChild);
    }
    function addObjectProperty(obj, container, basePath = '') {
        const newKey = prompt('Enter the new property key:');
        if(newKey===null) return;
        const newValue = prompt('Enter the new property value:');
        if(newValue===null) return;
        try{ obj[newKey] = JSON.parse(newValue); }catch(e){ obj[newKey] = newValue; }
        renderObject(obj, container, (container.level||-1)+1, basePath);
    }
    data={"rawtext":[]};
    extra={"scores":{},"selectors":{}};
    const extraContainer = document.getElementById('extra');
    const rawtextContainer = document.getElementById('rawtext');
    const evaluateDisplay = document.getElementById('evaluateDisplay');
    evaluateDisplay.addEventListener('click', () => {
        var text=evaluate(data, extra.scores, extra.selectors).join('');
        if(/[က-￿]/.test(text)){ evaluateDisplay.style.fontFamily="unifont"; }
        else { evaluateDisplay.style.fontFamily="Minecraft"; }
        text=text.replace(/§[^0-9a-u]/g,'');
        var sectionCount=(/§[0-9a-u]/g.exec(text)?.length||0)+1;
        evaluateDisplay.innerHTML =
            "<span class=\"text\">"+
            text
            .replaceAll("§0","<span class=\"text\" style=\"color: #000000\">")
            .replaceAll("§1","<span class=\"text\" style=\"color: #0000aa\">")
            .replaceAll("§2","<span class=\"text\" style=\"color: #00aa00\">")
            .replaceAll("§3","<span class=\"text\" style=\"color: #00aaaa\">")
            .replaceAll("§4","<span class=\"text\" style=\"color: #aa0000\">")
            .replaceAll("§5","<span class=\"text\" style=\"color: #aa00aa\">")
            .replaceAll("§6","<span class=\"text\" style=\"color: #ffaa00\">")
            .replaceAll("§7","<span class=\"text\" style=\"color: #aaaaaa\">")
            .replaceAll("§8","<span class=\"text\" style=\"color: #555555\">")
            .replaceAll("§9","<span class=\"text\" style=\"color: #5555ff\">")
            .replaceAll("§a","<span class=\"text\" style=\"color: #55ff55\">")
            .replaceAll("§b","<span class=\"text\" style=\"color: #55ffff\">")
            .replaceAll("§c","<span class=\"text\" style=\"color: #ff5555\">")
            .replaceAll("§d","<span class=\"text\" style=\"color: #ff55ff\">")
            .replaceAll("§e","<span class=\"text\" style=\"color: #ffff55\">")
            .replaceAll("§f","<span class=\"text\" style=\"color: #ffffff\">")
            .replaceAll("§g","<span class=\"text\" style=\"color: #ddd605\">")
            .replaceAll("§h","<span class=\"text\" style=\"color: #e3d4d1\">")
            .replaceAll("§i","<span class=\"text\" style=\"color: #cecaca\">")
            .replaceAll("§j","<span class=\"text\" style=\"color: #443a3b\">")
            .replaceAll("§k","<span class=\"text random\">")
            .replaceAll("§l","<span class=\"text\" style=\"font-weight: bold\">")
            .replaceAll("§m","<span class=\"text\" style=\"color: #971607\">")
            .replaceAll("§n","<span class=\"text\" style=\"color: #b4684d\">")
            .replaceAll("§o","<span class=\"text\" style=\"font-style: italic\">")
            .replaceAll("§p","<span class=\"text\" style=\"color: #deb12d\">")
            .replaceAll("§q","<span class=\"text\" style=\"color: #11a036\">")
            .replaceAll("§r","<span class=\"text\" style=\"color: #ffffff;font-weight: normal;font-style: normal\">")
            .replaceAll("§s","<span class=\"text\" style=\"color: #2cbaa8\">")
            .replaceAll("§t","<span class=\"text\" style=\"color: #21497b\">")
            .replaceAll("§u","<span class=\"text\" style=\"color: #9a5cc6\">")
            +"</span>".repeat(sectionCount);
    });
    renderObject(data, rawtextContainer);
    renderObject(extra, extraContainer);

    window.onerror = function (msg, url, lineNo, columnNo, error) {
        window.alert(msg);
        return false;
    }
</script>
</body>
